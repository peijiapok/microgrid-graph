# The topology-similarity metric itself.
# Choose one functional form in the week-3 PR; alternatives listed here
# so reviewers can see the design space considered.
d_struct:
  version: 0
  selected_functional_form: null    # one of: weighted_l2 | wasserstein_histogram | learned_mlp
  candidates:
    - weighted_l2:
        note: "Simplest. Per-feature weights are hyperparameters tuned to maximize R^2 with transfer gap."
    - wasserstein_histogram:
        note: "Treat degree distribution and motif counts as histograms; use 1-Wasserstein."
    - learned_mlp:
        note: "MLP over the concatenated feature vector, trained to regress observed transfer gap."
