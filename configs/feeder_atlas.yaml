# Feeder Atlas v0 — skeleton.
#
# Owner: Collaborator (C6, see docs/02_research_goal.md).
#
# This file is the structural fingerprint registry. Each feeder listed
# here gets filled with graph-mining-native features. The topology-
# similarity metric d_struct (C6) is defined over these features. Every
# topology split (see configs/topology_split_*.yaml) is justified by
# structural distance computed against this atlas.
#
# Required features per feeder (fill during week 3, per docs/03 §5):
#
#   degree_distribution:
#     mean, std, max, p95
#
#   spectral:
#     algebraic_connectivity      # Fiedler value of the Laplacian
#     spectral_gap                # λ2 - λ1 of the normalized Laplacian
#     first_three_eigvals         # leading eigvals of the Laplacian
#
#   shape:
#     diameter
#     avg_path_length
#     clustering_coefficient
#
#   motifs:
#     # normalized counts; use networkx or orca / pgd for graphlets up to k=4
#     triangle_count_normalized
#     four_cycle_count_normalized
#     four_path_count_normalized
#     four_star_count_normalized
#
#   community:
#     num_communities             # via Louvain or Leiden
#     modularity
#     community_size_entropy      # Shannon entropy of normalized community sizes
#
# HARD CONSTRAINT (C6 done-when §1): every feature above must be computable
# in under 1 second per feeder, on CPU. Use approximations if exact counts
# are too slow.

